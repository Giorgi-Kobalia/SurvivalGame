<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Farm Game</title>
</head>
<body>

    <div id="notification" class="notification"></div>

    <div class="navigation" id="navigation">

        <div class="inventoryTitle">
            📦 Inventory
            <div class="inventory">
                <div class="items" data-action="inventory-slot" data-index="0"></div>
                <div class="items" data-action="inventory-slot" data-index="1"></div>
                <div class="items" data-action="inventory-slot" data-index="2"></div>
                <div class="items" data-action="inventory-slot" data-index="3"></div>
                <div class="items" data-action="inventory-slot" data-index="4"></div>
                <div class="items" data-action="inventory-slot" data-index="5"></div>
                <div class="items" data-action="inventory-slot" data-index="6"></div>
                <div class="items" data-action="inventory-slot" data-index="7"></div>
                <div class="items" data-action="inventory-slot" data-index="8"></div>
                <div class="items" data-action="inventory-slot" data-index="9"></div>
                <div class="items" data-action="inventory-slot" data-index="10"></div>
                <div class="items" data-action="inventory-slot" data-index="11"></div>
                <div class="items" data-action="inventory-slot" data-index="12"></div>
                <div class="items" data-action="inventory-slot" data-index="13"></div>
                <div class="items" data-action="inventory-slot" data-index="14"></div>
                <div class="items" data-action="inventory-slot" data-index="15"></div>
                <div class="items" data-action="inventory-slot" data-index="16"></div>
                <div class="items" data-action="inventory-slot" data-index="17"></div>
            </div>
        </div>

        <div class="stats" id="stats">

            <div class="statRow">
                <span class="statIcon">🍖</span>
                <div class="status">
                    <div class="hunger-bar" id="hunger-bar"></div>
                </div>
                <span class="statValue" id="hunger-val">100</span>
            </div>

            <div class="statRow">
                <span class="statIcon">⚡</span>
                <div class="status">
                    <div class="energy-bar" id="energy-bar"></div>
                </div>
                <span class="statValue" id="energy-val">100</span>
            </div>

        </div>

        <div class="hud-panel days" id="days">Day 1</div>

        <div class="hud-panel gold" id="gold-display">0g</div>

        <div class="resetBtn" data-action="reset-game" title="New game">↺</div>

        <div id="modal" class="modal"></div>

        <div class="curtain_left"  id="cl"></div>
        <div class="curtain_right" id="cr"></div>

        <div class="playground" id="playground">
            <div class="pointerHome" data-action="open-teleports"></div>
        </div>

    </div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
